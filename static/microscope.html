<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivGraph Microscope</title>
  <style>
    :root {
      --bg: #141822;
      --surface: rgba(22, 26, 38, 0.82);
      --surface-solid: #181c2a;
      --border: rgba(70, 80, 110, 0.45);
      --border-glow: rgba(100, 160, 230, 0.18);
      --text: #d0d4de;
      --text-dim: #6e7488;
      --accent: #5a9fe4;
      --accent2: #e07070;
      --accent3: #5ad49a;
      --font: "SF Mono", "Fira Code", "JetBrains Mono", "Consolas", monospace;
      --panel-radius: 6px;
      --panel-shadow:
        0 2px 20px rgba(0, 0, 0, 0.4),
        0 0 1px rgba(100, 160, 230, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: url("/static/textures/gradient-bg.png") center / cover fixed no-repeat;
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      font-size: 11px;
    }

    /* Film grain + scanline overlay */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        url("/static/textures/noise.png"),
        url("/static/textures/scanlines.png");
      pointer-events: none;
      z-index: 9999;
    }

    #microscope {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      height: 100vh;
      gap: 4px;
      padding: 4px;
    }

    /* ── Header ────────────────────────────── */
    #header {
      background:
        url("/static/textures/title-deco.png"),
        url("/static/textures/brushed-metal.png"),
        linear-gradient(180deg, rgba(60, 70, 100, 0.3) 0%, rgba(22, 26, 38, 0.85) 50%, rgba(18, 20, 32, 0.9) 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-top: 1px solid rgba(120, 140, 180, 0.25);
      border-radius: var(--panel-radius);
      box-shadow: var(--panel-shadow);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #header h1 {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 8px rgba(90, 159, 228, 0.4);
    }

    #header .status {
      color: var(--text-dim);
      font-size: 10px;
    }

    /* ── Summary bar ───────────────────────── */
    #summary {
      background:
        url("/static/textures/grid.png"),
        var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--panel-radius);
      box-shadow: var(--panel-shadow);
      padding: 6px 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 10px;
    }

    .summary-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid transparent;
      transition: all 0.15s;
    }

    .summary-chip:hover {
      border-color: var(--border);
    }

    .summary-chip.active {
      border-color: var(--accent);
      background: rgba(90, 159, 228, 0.1);
    }

    .summary-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .summary-count {
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .summary-label {
      color: var(--text-dim);
    }

    /* ── Filter bar ────────────────────────── */
    #filters {
      background: var(--surface);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--panel-radius);
      padding: 4px 16px;
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 10px;
    }

    #filters input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 3px 8px;
      border-radius: 3px;
      font-family: var(--font);
      font-size: 10px;
      width: 180px;
    }

    #filters input:focus { outline: none; border-color: var(--accent); }

    #filters label { color: var(--text-dim); }

    .btn {
      padding: 4px 12px;
      background: linear-gradient(180deg, rgba(50, 55, 75, 0.8) 0%, rgba(25, 28, 40, 0.9) 100%);
      border: 1px solid var(--border);
      border-top-color: rgba(100, 110, 140, 0.35);
      color: var(--text);
      border-radius: 3px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 10px;
      transition: all 0.15s;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); background: linear-gradient(180deg, rgba(60, 70, 95, 0.85) 0%, rgba(30, 34, 50, 0.95) 100%); }
    .btn-primary { background: linear-gradient(180deg, #6db3f0 0%, #4a88cc 100%); border-color: #4a88cc; border-top-color: rgba(160, 200, 255, 0.4); color: #000; }

    /* ── Transaction stream ────────────────── */
    #stream {
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--panel-radius);
      box-shadow: var(--panel-shadow);
      overflow-y: auto;
      padding: 4px 0;
    }

    .tx-row {
      display: grid;
      grid-template-columns: 32px 90px 1fr 60px;
      gap: 8px;
      padding: 3px 16px;
      border-bottom: 1px solid rgba(70, 80, 110, 0.15);
      align-items: center;
      font-size: 10px;
      animation: fadeIn 0.3s ease;
      cursor: pointer;
      transition: background 0.1s;
    }

    .tx-row:hover {
      background: rgba(90, 159, 228, 0.06);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-2px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .tx-idx {
      color: var(--text-dim);
      font-size: 9px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .tx-type {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .tx-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tx-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tx-context {
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tx-context .source { color: var(--accent); }
    .tx-context .target { color: var(--accent3); }
    .tx-context .arrow { color: var(--text-dim); opacity: 0.5; }
    .tx-context .detail { color: var(--text-dim); }

    .tx-magnitude {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-size: 10px;
    }

    .tx-magnitude.positive { color: var(--accent3); }
    .tx-magnitude.negative { color: var(--accent2); }
    .tx-magnitude.neutral { color: var(--text-dim); }

    /* ── Footer ────────────────────────────── */
    #footer {
      background:
        url("/static/textures/grid.png"),
        var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--panel-radius);
      box-shadow: var(--panel-shadow);
      padding: 6px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: var(--text-dim);
    }

    /* ── Empty state ───────────────────────── */
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 300;
    }

    /* ── Scrollbar ──────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(70, 80, 110, 0.45); border-radius: 2px; }
  </style>
</head>
<body>

<div id="microscope">

  <div id="header">
    <h1>Microscope</h1>
    <div class="status" id="status">Waiting for tick data...</div>
  </div>

  <div id="summary"></div>

  <div id="stream">
    <div class="empty-state">Advance the simulation in the main window to see atomic transactions</div>
  </div>

  <div id="footer">
    <span id="footer-count">0 transactions</span>
    <div style="display:flex;gap:6px">
      <input type="text" id="search" placeholder="filter by agent or keyword..." style="width:200px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:3px 8px;border-radius:3px;font-family:var(--font);font-size:10px">
      <button class="btn" id="btn-export">Export Artifact</button>
      <button class="btn" id="btn-refresh">Refresh</button>
    </div>
  </div>

</div>

<script>
const API = window.location.origin;

// ── State ────────────────────────────────────────────────────────────
let allTransactions = [];
let txTypes = {};
let activeFilter = null;
let searchFilter = "";

// ── Escaping ─────────────────────────────────────────────────────────
const _esc = {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"};
function esc(s) { return String(s).replace(/[&<>"']/g, c => _esc[c]); }

// ── Fetch transactions ───────────────────────────────────────────────
async function fetchTransactions() {
  try {
    const r = await fetch(`${API}/api/transactions?limit=5000`);
    const data = await r.json();
    allTransactions = data.transactions || [];
    txTypes = data.types || {};
    const summary = data.summary || {};
    renderSummary(summary);
    renderStream();
    document.getElementById("status").textContent =
      `${summary.total_recorded || 0} recorded / ${summary.total_actual || 0} actual`;
  } catch (e) {
    document.getElementById("status").textContent = "Error fetching transactions";
  }
}

// ── Summary chips ────────────────────────────────────────────────────
function renderSummary(summary) {
  const container = document.getElementById("summary");
  const byType = summary.by_type || {};
  const actualByType = summary.actual_by_type || {};

  let html = "";
  for (const [type, count] of Object.entries(byType).sort((a,b) => b[1] - a[1])) {
    const info = txTypes[type] || {};
    const color = info.color || "#5a6575";
    const label = info.label || type;
    const actual = actualByType[type] || count;
    const isActive = activeFilter === type;
    html += `<div class="summary-chip${isActive ? ' active' : ''}" data-type="${esc(type)}">
      <span class="summary-dot" style="background:${color}"></span>
      <span class="summary-count">${actual}</span>
      <span class="summary-label">${esc(label)}</span>
    </div>`;
  }

  // Total
  const total = summary.total_actual || summary.total_recorded || 0;
  html = `<div class="summary-chip" data-type="" style="border-color:var(--border)">
    <span class="summary-count" style="color:var(--accent)">${total}</span>
    <span class="summary-label">total</span>
  </div>` + html;

  container.innerHTML = html;

  // Click handlers
  container.querySelectorAll(".summary-chip").forEach(chip => {
    chip.addEventListener("click", () => {
      const type = chip.dataset.type;
      activeFilter = type === activeFilter || type === "" ? null : type;
      container.querySelectorAll(".summary-chip").forEach(c => c.classList.remove("active"));
      if (activeFilter) chip.classList.add("active");
      renderStream();
    });
  });
}

// ── Transaction stream ───────────────────────────────────────────────
function renderStream() {
  const container = document.getElementById("stream");
  let txs = allTransactions;

  // Apply type filter
  if (activeFilter) {
    txs = txs.filter(tx => tx.type === activeFilter);
  }

  // Apply search filter
  if (searchFilter) {
    const q = searchFilter.toLowerCase();
    txs = txs.filter(tx =>
      tx.source.toLowerCase().includes(q) ||
      tx.target.toLowerCase().includes(q) ||
      tx.context.toLowerCase().includes(q)
    );
  }

  if (txs.length === 0) {
    container.innerHTML = `<div class="empty-state">${
      allTransactions.length === 0
        ? "Advance the simulation in the main window to see atomic transactions"
        : "No transactions match the current filter"
    }</div>`;
    document.getElementById("footer-count").textContent = "0 transactions";
    return;
  }

  let html = "";
  const limit = Math.min(txs.length, 2000);
  for (let i = 0; i < limit; i++) {
    const tx = txs[i];
    const info = txTypes[tx.type] || {};
    const color = tx.color || info.color || "#5a6575";
    const label = tx.label || info.label || tx.type;
    const mag = tx.magnitude;
    const magClass = mag > 0.001 ? "positive" : mag < -0.001 ? "negative" : "neutral";
    const magStr = mag > 0 ? `+${mag.toFixed(3)}` : mag.toFixed(3);

    html += `<div class="tx-row" data-source-id="${esc(tx.source_id)}" data-target-id="${esc(tx.target_id)}">
      <span class="tx-idx">${i + 1}</span>
      <div class="tx-type">
        <span class="tx-dot" style="background:${color}"></span>
        <span class="tx-label" style="color:${color}">${esc(label)}</span>
      </div>
      <div class="tx-context">
        <span class="source">${esc(tx.source)}</span>
        <span class="arrow"> &rarr; </span>
        <span class="target">${esc(tx.target)}</span>
        <span class="detail"> | ${esc(tx.context)}</span>
      </div>
      <span class="tx-magnitude ${magClass}">${magStr}</span>
    </div>`;
  }

  container.innerHTML = html;
  document.getElementById("footer-count").textContent =
    `${limit}${limit < txs.length ? ` of ${txs.length}` : ""} transactions`;

  // Click to highlight in main window
  container.querySelectorAll(".tx-row").forEach(row => {
    row.addEventListener("click", () => {
      const sourceId = row.dataset.sourceId;
      const targetId = row.dataset.targetId;
      if (window.opener && (sourceId || targetId)) {
        window.opener.postMessage({
          type: "microscope_highlight",
          agentIds: [sourceId, targetId].filter(Boolean),
        }, window.location.origin);
      }
    });
  });
}

// ── Export as artifact ────────────────────────────────────────────────
function exportArtifact() {
  const PAPER = "#fafafa";
  const INK = "#1a1a1a";
  const INK_LIGHT = "#4a4a4a";
  const INK_FAINT = "#b0b0b0";
  const GRID = "#e0e0e0";
  const SEPIA = "#6a6a6a";
  const FONT = '-apple-system, "Helvetica Neue", Arial, sans-serif';

  const canvas = document.createElement("canvas");
  const scale = 2;
  const w = 1400;
  const h = 900;
  canvas.width = w * scale;
  canvas.height = h * scale;
  const ctx = canvas.getContext("2d");
  ctx.scale(scale, scale);

  // Clean white background (no texture)
  ctx.fillStyle = PAPER;
  ctx.fillRect(0, 0, w, h);

  // Registration: single border + crop marks
  ctx.strokeStyle = INK_FAINT;
  ctx.lineWidth = 0.3;
  ctx.strokeRect(12, 12, w - 24, h - 24);
  const m = 12, gap = 2, len = 8;
  [[m,m,1,1],[w-m,m,-1,1],[m,h-m,1,-1],[w-m,h-m,-1,-1]].forEach(([x,y,dx,dy]) => {
    ctx.beginPath();
    ctx.moveTo(x - dx*(len+gap), y); ctx.lineTo(x - dx*gap, y);
    ctx.moveTo(x, y - dy*(len+gap)); ctx.lineTo(x, y - dy*gap);
    ctx.stroke();
  });

  // Title: left-aligned, semibold, uppercase
  ctx.fillStyle = INK;
  ctx.font = `600 15px ${FONT}`;
  ctx.textAlign = "left";
  ctx.fillText("LEDGER OF TRANSACTIONS", 20, 34);
  ctx.font = `300 9px ${FONT}`;
  ctx.fillStyle = INK_LIGHT;
  ctx.fillText(`${allTransactions.length} atomic interactions recorded during simulation tick`, 20, 46);

  // Plate number: large, light, right-aligned
  ctx.font = `600 22px ${FONT}`;
  ctx.fillStyle = INK_FAINT;
  ctx.textAlign = "right";
  ctx.fillText("08", w - 20, 36);
  ctx.font = `500 7px ${FONT}`;
  ctx.fillText("CIVGRAPH", w - 20, 46);
  ctx.font = `300 7px ${FONT}`;
  ctx.fillText(new Date().toISOString().slice(0, 10), w - 20, 54);

  // Single rule
  ctx.strokeStyle = INK_FAINT;
  ctx.lineWidth = 0.4;
  ctx.beginPath(); ctx.moveTo(20, 58); ctx.lineTo(w - 20, 58); ctx.stroke();

  // Summary section
  const summaryData = {};
  for (const tx of allTransactions) {
    summaryData[tx.type] = (summaryData[tx.type] || 0) + 1;
  }
  const sortedTypes = Object.entries(summaryData).sort((a, b) => b[1] - a[1]);

  ctx.textAlign = "left";
  let sx = 30;
  const sy = 72;
  ctx.font = `600 8px ${FONT}`;
  ctx.fillStyle = INK;
  ctx.fillText("SUMMARY", sx, sy);
  ctx.font = `300 7px ${FONT}`;
  let si = 0;
  for (const [type, count] of sortedTypes) {
    const info = txTypes[type] || {};
    const color = info.color || "#707070";
    const label = info.label || type;
    const x = sx + (si % 5) * 130;
    const y = sy + 14 + Math.floor(si / 5) * 12;
    ctx.beginPath();
    ctx.arc(x + 3, y - 2, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.fillStyle = INK_LIGHT;
    ctx.fillText(`${label}: ${count}`, x + 10, y);
    si++;
  }

  // Rule
  const ledgerTop = sy + 14 + Math.ceil(sortedTypes.length / 5) * 12 + 10;
  ctx.strokeStyle = GRID;
  ctx.lineWidth = 0.3;
  ctx.beginPath(); ctx.moveTo(20, ledgerTop); ctx.lineTo(w - 20, ledgerTop); ctx.stroke();

  // Transaction rows
  const rowH = 9;
  const maxRows = Math.floor((h - ledgerTop - 60) / rowH);
  const txs = allTransactions.slice(0, maxRows);

  ctx.font = `300 6.5px ${FONT}`;
  for (let i = 0; i < txs.length; i++) {
    const tx = txs[i];
    const y = ledgerTop + 12 + i * rowH;
    const info = txTypes[tx.type] || {};
    const color = info.color || "#707070";

    // Index
    ctx.fillStyle = INK_FAINT;
    ctx.textAlign = "right";
    ctx.fillText(String(i + 1).padStart(3, " "), 38, y);

    // Type dot
    ctx.beginPath();
    ctx.arc(44, y - 2, 1.8, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    // Type label
    ctx.fillStyle = color;
    ctx.textAlign = "left";
    ctx.font = `600 6px ${FONT}`;
    ctx.fillText((info.label || tx.type).toUpperCase(), 50, y);

    // Source -> Target
    ctx.font = `400 6.5px ${FONT}`;
    ctx.fillStyle = INK;
    const srcTgt = `${tx.source} \u2192 ${tx.target}`;
    ctx.fillText(srcTgt.substring(0, 40), 140, y);

    // Context
    ctx.fillStyle = INK_LIGHT;
    ctx.font = `300 6.5px ${FONT}`;
    ctx.fillText(tx.context.substring(0, 55), 380, y);

    // Magnitude
    ctx.textAlign = "right";
    const mag = tx.magnitude;
    ctx.fillStyle = mag > 0.001 ? "#008844" : mag < -0.001 ? "#cc0000" : INK_FAINT;
    ctx.font = `400 6.5px ${FONT}`;
    ctx.fillText(mag > 0 ? `+${mag.toFixed(3)}` : mag.toFixed(3), w - 24, y);
    ctx.textAlign = "left";

    // Faint rule every 5 rows
    if (i % 5 === 4) {
      ctx.strokeStyle = GRID;
      ctx.lineWidth = 0.08;
      ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.moveTo(30, y + 3); ctx.lineTo(w - 30, y + 3); ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  // Bottom legend
  const ly = h - 40;
  ctx.strokeStyle = INK_FAINT;
  ctx.lineWidth = 0.3;
  ctx.beginPath(); ctx.moveTo(24, ly - 6); ctx.lineTo(w - 24, ly - 6); ctx.stroke();
  ctx.fillStyle = INK_LIGHT;
  ctx.font = `600 7px ${FONT}`;
  ctx.fillText("READING THE LEDGER", 30, ly + 4);
  ctx.font = `300 7px ${FONT}`;
  ctx.fillStyle = SEPIA;
  ctx.fillText("Each row records a single atomic interaction. Green = beneficial, red = detrimental. Sources include non-human actants (Latour).", 30, ly + 14);

  // Download
  const link = document.createElement("a");
  link.download = `civgraph-ledger-${Date.now()}.png`;
  link.href = canvas.toDataURL("image/png");
  link.click();
}

// ── Event listeners ──────────────────────────────────────────────────
document.getElementById("btn-refresh").addEventListener("click", fetchTransactions);
document.getElementById("btn-export").addEventListener("click", exportArtifact);
document.getElementById("search").addEventListener("input", (e) => {
  searchFilter = e.target.value;
  renderStream();
});

// Listen for tick completion from main window
window.addEventListener("message", (e) => {
  if (e.data && e.data.type === "tick_complete") {
    fetchTransactions();
  }
});

// Auto-poll every 3 seconds
setInterval(() => {
  if (allTransactions.length === 0) fetchTransactions();
}, 3000);

// Initial load
fetchTransactions();
</script>

</body>
</html>
